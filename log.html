<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox Log</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;font-size:14px;min-height:100vh}
  .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:18px 24px;border-bottom:1px solid #2a2a4a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .header-left h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px}
  .header-left .sub{font-size:12px;color:#888;margin-top:3px}
  .nav{display:flex;gap:6px}
  .nav a{padding:7px 16px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s}
  .nav a.active{background:#4f46e5;color:#fff}
  .nav a:not(.active){background:#1e1e3a;color:#aaa;border:1px solid #2a2a4a}
  .nav a:not(.active):hover{background:#252545;color:#fff}
  .live-dot{display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;margin-right:6px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .stats{display:flex;gap:12px;padding:16px 24px;background:#111127;border-bottom:1px solid #1e1e3a;flex-wrap:wrap}
  .stat{background:#1a1a30;border-radius:8px;padding:12px 18px;min-width:90px;text-align:center;border:1px solid #2a2a4a}
  .stat .num{font-size:26px;font-weight:700}
  .stat .label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
  .stat.green .num{color:#22c55e}
  .stat.amber .num{color:#f59e0b}
  .stat.red .num{color:#f87171}
  .stat.blue .num{color:#60a5fa}
  .action-needed{background:#1a180a;border:1px solid #a16207;border-radius:8px;margin:16px 24px;overflow:hidden}
  .action-needed .head{background:#2a2000;padding:10px 16px;font-weight:600;font-size:13px;color:#fbbf24;display:flex;align-items:center;gap:8px}
  .action-item{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid #2a2000}
  .action-item:last-child{border-bottom:none}
  .action-item input[type="checkbox"]{width:16px;height:16px;margin-top:1px;cursor:pointer;accent-color:#f59e0b;flex-shrink:0}
  .action-item .detail .subject{font-weight:600;font-size:13px;color:#fde68a}
  .action-item .detail .meta{font-size:12px;color:#a16207;margin-top:2px}
  .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:700;margin-right:4px}
  .p1{background:#7f1d1d;color:#fca5a5}
  .p2{background:#451a03;color:#fbbf24}
  .draft-tag{background:#1e3a5f;color:#93c5fd}
  .cal-tag{background:#1a3a1a;color:#86efac}
  .section{margin:16px 24px}
  .section h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4f46e5;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .section h3 .badge{font-size:10px;background:#1e1e3a;color:#818cf8;padding:2px 8px;border-radius:10px;font-weight:500;text-transform:none;letter-spacing:0}
  table{width:100%;border-collapse:collapse;background:#111127;border-radius:8px;overflow:hidden;border:1px solid #1e1e3a}
  th{background:#16162e;padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#555;font-weight:600}
  td{padding:7px 12px;border-bottom:1px solid #1a1a30;font-size:12px;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#141428}
  .s-archived{color:#22c55e;font-weight:500}
  .s-deleted{color:#f87171;font-weight:500}
  .s-kept{color:#f59e0b;font-weight:500}
  .s-draft{color:#60a5fa;font-weight:500}
  .acc-gmail{color:#f87171;font-size:10px;font-weight:700}
  .acc-analytiqx{color:#60a5fa;font-size:10px;font-weight:700}
  .acc-personal{color:#4ade80;font-size:10px;font-weight:700}
  .run-history{display:flex;flex-direction:column;gap:8px}
  .run{background:#111127;border:1px solid #1e1e3a;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .run .run-id{font-weight:700;color:#818cf8;font-size:13px;min-width:80px}
  .run .run-date{color:#6b7280;font-size:12px}
  .run .run-stats{display:flex;gap:10px;font-size:12px;flex:1}
  .run .run-stats span{color:#aaa}
  .run .run-stats strong{color:#e2e8f0}
  .run-complete{border-left:3px solid #22c55e}
  .run-partial{border-left:3px solid #f59e0b}
  .empty{color:#4a4a6a;font-size:13px;padding:20px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📋 Triage Log</h1>
    <div class="sub"><span class="live-dot"></span><span id="lastUpdated">Loading...</span></div>
  </div>
  <div class="nav">
    <a href="review.html">Review</a>
    <a href="log.html" class="active">Log</a>
  </div>
</div>

<div class="stats" id="statsBar">
  <div class="stat blue"><div class="num" id="s-scanned">—</div><div class="label">Scanned</div></div>
  <div class="stat green"><div class="num" id="s-archived">—</div><div class="label">Archived</div></div>
  <div class="stat red"><div class="num" id="s-deleted">—</div><div class="label">Deleted</div></div>
  <div class="stat amber"><div class="num" id="s-action">—</div><div class="label">Action Needed</div></div>
  <div class="stat blue"><div class="num" id="s-drafts">—</div><div class="label">Drafts</div></div>
</div>

<div id="actionNeeded" class="action-needed" style="display:none">
  <div class="head">⚠️ Your Action Required <span id="actionCount" style="background:#7f1d1d;color:#fca5a5;font-size:11px;padding:1px 8px;border-radius:10px;font-weight:500"></span></div>
  <div id="actionItems"></div>
</div>

<div class="section">
  <h3>Latest Run — Actions Taken <span class="badge" id="latestRunId"></span></h3>
  <table id="actionsTable">
    <tr><th>Account</th><th>Date</th><th>From</th><th>Subject</th><th>Action</th><th>Routed To</th></tr>
    <tr><td colspan="6" class="empty">No runs yet</td></tr>
  </table>
</div>

<div class="section">
  <h3>Run History <span class="badge" id="historyCount"></span></h3>
  <div class="run-history" id="runHistory"><div class="empty">No history yet</div></div>
</div>

<script>
const LOG_DATA = {
  generated: "PENDING — No triage run yet",
  latestRun: null,
  actionNeeded: [],
  actions: [],
  history: []
};

function render() {
  document.getElementById('lastUpdated').textContent = LOG_DATA.generated;

  // Stats
  const stats = LOG_DATA.latestRun || {};
  document.getElementById('s-scanned').textContent = stats.scanned || '—';
  document.getElementById('s-archived').textContent = stats.archived || '—';
  document.getElementById('s-deleted').textContent = stats.deleted || '—';
  document.getElementById('s-action').textContent = stats.actionNeeded || '—';
  document.getElementById('s-drafts').textContent = stats.drafts || '—';
  document.getElementById('latestRunId').textContent = stats.runId || '';

  // Action needed
  const actions = LOG_DATA.actionNeeded;
  if (actions.length > 0) {
    document.getElementById('actionNeeded').style.display = '';
    document.getElementById('actionCount').textContent = actions.length;
    document.getElementById('actionItems').innerHTML = actions.map(a => `
      <div class="action-item">
        <input type="checkbox" onchange="this.closest('.action-item').style.opacity=this.checked?'0.4':'1'">
        <div class="detail">
          <div class="subject">${a.tags ? a.tags.map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('') : ''}${a.subject}</div>
          <div class="meta">${a.meta}</div>
        </div>
      </div>`).join('');
  }

  // Actions table
  const tbody = document.getElementById('actionsTable');
  if (LOG_DATA.actions.length > 0) {
    tbody.innerHTML = '<tr><th>Account</th><th>Date</th><th>From</th><th>Subject</th><th>Action</th><th>Routed To</th></tr>' +
      LOG_DATA.actions.map(a => `<tr>
        <td><span class="acc-${a.account.toLowerCase().replace(' ','')}">${a.account}</span></td>
        <td style="color:#6b7280;white-space:nowrap">${a.date}</td>
        <td style="color:#c4b5fd;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowraw">${a.from}</td>
        <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.subject}</td>
        <td class="s-${a.action.toLowerCase()}">${a.action}</td>
        <td style="color:#6b7280;font-size:11px">${a.dest || ''}</td>
      </tr>`).join('');
  }

  // History
  document.getElementById('historyCount').textContent = LOG_DATA.history.length + ' runs';
  const hist = document.getElementById('runHistory');
  if (LOG_DATA.history.length > 0) {
    hist.innerHTML = LOG_DATA.history.map(r => `
      <div class="run run-${r.status}">
        <div class="run-id">${r.runId}</div>
        <div class="run-date">${r.date}</div>
        <div class="run-stats">
          <span>Scanned: <strong>${r.scanned}</strong></span>
          <span>Archived: <strong>${r.archived}</strong></span>
          <span>Deleted: <strong>${r.deleted}</strong></span>
          <span>Action: <strong>${r.actionNeeded}</strong></span>
        </div>
      </div>`).join('');
  }
}

render();
</script>
</body>
</html>
